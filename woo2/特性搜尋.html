<body>

  <input type="text" id="traitsInput" placeholder="選擇的特性會顯示在這裡（用空格區分）">
  <button id="clearBtn">清除資料</button>
  <div id="results"></div>

  <script>
    const buttons = document.querySelectorAll('.btn');
    const inputField = document.getElementById('traitsInput');
    const clearBtn = document.getElementById('clearBtn');
    const results = document.getElementById('results');
    let selectedTraits = [];

    const zones = {
    "格蘭威爾城": ["神聖", "自然", "希望","絢爛", "祝福", "智慧", "藝術","先導", "清爽", "孤獨"],
    "奧茲的爪痕": ["勇氣", "幸運", "信念", "堅實", "活力","克己", "溫柔", "內向", "性感"],
    "榮光鎮": ["威嚴", "再生", "純粹", "自由", "療癒", "友好", "魅力", "積極", "冷靜"],
    "已知的遺跡": ["愛情","真心", "高貴", "祝福","指導力", "樂觀", "華麗", "朝氣", "清爽", "寂寞", "愉快"],
    "夢之森": ["勇敢","信賴", "神秘","審美眼光", "忠心", "壞心眼", "清潔", "安定", "自信", "純潔"],
    "冰之森": ["誠實", "高貴", "熱情", "信念", "奔放","先導", "高尚", "有精神", "愉快", "寂寞"],
    "冰之鎮": ["勝利","破天荒", "幸運","眷戀",  "忠心", "藝術","奇特", "清潔", "耐力", "冷靜", "雙面人"],
    "時之洞窟": ["威嚴", "殘酷","審美眼光", "樂觀", "奔放", "靈敏","共榮", "高尚", "自信", "直率"],
    "死之湖": ["勇氣", "信賴", "希望", "信念","派頭", "療癒","共榮", "魅力", "頑固", "純潔", "樸素"],
    "雨之鎮": ["破天荒","殘酷", "神秘", "熱情", "祝福", "公平", "細膩", "清爽", "孤獨"],
    "薛伍德之森": ["誠實", "優雅", "熱情","派頭", "奔放","奇特", "和睦", "宏大", "有精神", "頑固"],
    "布蘭謝德城": ["勝利", "信賴", "殘酷", "堅實", "壞心眼", "清潔", "宏大", "認真", "祥和"],
    "嵐之谷": ["威嚴", "自然", "古風","親密", "自由",  "活力","狂熱", "溫柔", "有精神", "性感"],
    "人跡罕至的天文台": ["愛情", "正義","真心", "熱血", "古風","親密", "智慧", "朝氣", "認真", "祥和"],
    "泡沫之鎮": ["勇氣", "神聖","熱血", "堅實","克己", "療癒", "細膩", "直率", "孤獨"],
    "豐饒鎮": ["再生", "神秘", "熱血","絢爛", "純粹", "華麗", "公平", "內向", "性感", "堅強"],
    "貝涅特酒館": ["正義", "幸運", "忠心", "藝術","先導", "安定", "溫柔", "積極", "純潔"],
    "疫沼": ["勝利", "自然", "古風","眷戀", "自由", "華麗", "和睦", "冷靜", "雙面人", "堅強"],
    "第谷湖": ["信賴", "優雅", "希望", "純粹","指導力", "公平", "耐力", "友好", "頑固", "內向", "樸素"],
    "雲之鎮": ["愛情", "再生", "樂觀", "靈敏","狂熱", "魅力", "耿直", "寂寞", "雙面人"],
    "雷塔山脈": ["神聖", "誠實", "智慧", "壞心眼", "活力", "耐力", "積極", "認真"],
      };

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    const trait = btn.textContent;
    if (selectedTraits.includes(trait)) {
      selectedTraits = selectedTraits.filter(t => t !== trait);
      btn.classList.remove('selected');
    } else {
      if (selectedTraits.length < 5) {
        selectedTraits.push(trait);
        btn.classList.add('selected');
      }
    }
    inputField.value = selectedTraits.join(' ');
    updateResults(); 
  });
});

clearBtn.addEventListener('click', () => {
  selectedTraits = [];
  buttons.forEach(btn => btn.classList.remove('selected'));
  inputField.value = '';
  results.innerHTML = '';
});

inputField.addEventListener('input', () => {
  selectedTraits = inputField.value.trim().split(/\s+/).filter(Boolean);
  buttons.forEach(btn => {
    if (selectedTraits.includes(btn.textContent)) {
      btn.classList.add('selected');
    } else {
      btn.classList.remove('selected');
    }
  });
  updateResults();
});

function updateResults() {
  results.innerHTML = '';
  if (selectedTraits.length === 0) return;

  const matches = [];

  for (const [zone, traits] of Object.entries(zones)) {
    const found = selectedTraits.filter(t => traits.includes(t));
    if (found.length > 0) {
      matches.push({ zone, found });
    }
  }

  matches.sort((a, b) => b.found.length - a.found.length);

  for (const match of matches) {
    const p = document.createElement('p');
    p.textContent = `符合的地點【${match.zone}】(${match.found.join(', ')})`;
    results.appendChild(p);
  }
}

const coll = document.getElementsByClassName("collapsible");
for (let i = 0; i < coll.length; i++) {
  coll[i].addEventListener("click", function () {
    this.classList.toggle("active");
    const content = this.nextElementSibling;
    content.style.display = content.style.display === "block" ? "none" : "block";
  });
}

  </script>
